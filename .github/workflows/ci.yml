name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-static-site:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify static site files
        run: |
          test -f index.html
          test -f css/style.css
